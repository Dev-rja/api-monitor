name: Poll APIs and update report

on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:

jobs:
  poll-and-report:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Create data directory
        run: mkdir -p data

      - name: Run poller
        run: python ingestion/poller.py

      - name: Set up dbt profiles
        run: |
          mkdir -p ~/.dbt
          echo "api_monitor:" > ~/.dbt/profiles.yml
          echo "  target: dev" >> ~/.dbt/profiles.yml
          echo "  outputs:" >> ~/.dbt/profiles.yml
          echo "    dev:" >> ~/.dbt/profiles.yml
          echo "      type: sqlite" >> ~/.dbt/profiles.yml
          echo "      threads: 1" >> ~/.dbt/profiles.yml
          echo "      database: $GITHUB_WORKSPACE/data/monitor.db" >> ~/.dbt/profiles.yml
          echo "      schema: main" >> ~/.dbt/profiles.yml
          echo "      schemas_and_paths:" >> ~/.dbt/profiles.yml
          echo "        main: $GITHUB_WORKSPACE/data/monitor.db" >> ~/.dbt/profiles.yml
          echo "      schema_directory: $GITHUB_WORKSPACE/data" >> ~/.dbt/profiles.yml

      - name: Drop stg_pings view
        run: python -c "import sqlite3, os; conn = sqlite3.connect(os.path.join(os.environ['GITHUB_WORKSPACE'], 'data', 'monitor.db')); conn.execute('DROP VIEW IF EXISTS stg_pings'); conn.commit(); conn.close()"

      - name: Run dbt
        working-directory: dbt
        run: |
          dbt run
          dbt test

      - name: Generate report
        run: python reports/generate_report.py

      - name: Commit and push changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/monitor.db report.md
          git diff --staged --quiet || git commit -m "chore: update SLA report $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push
